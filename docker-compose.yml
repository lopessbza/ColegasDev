services: 
  nginx: 
    image: nginx:stable-alpine 
    container_name: colegasdev_nginx 
    ports: 
      - "8082:80" 
    volumes: 
      - ./src:/var/www/html 
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf 
    depends_on: 
      - php 
    networks: 
      - colegasdev_network 
 
  php: 
    build: 
      context: . 
      dockerfile: ./docker/php/Dockerfile 
    container_name: colegasdev_php 
    working_dir: /var/www/html 
    volumes: 
      - ./src:/var/www/html 
    depends_on: 
      - mysql 
    networks: 
      - colegasdev_network 
 
  mysql: 
    image: mysql:8.0 
    container_name: colegasdev_mysql 
    restart: unless-stopped 
    environment: 
      MYSQL_DATABASE: colegasdev 
      MYSQL_USER: user 
      MYSQL_PASSWORD: user 
      MYSQL_ROOT_PASSWORD: root 
    volumes: 
      - mysql_data:/var/lib/mysql 
    networks: 
      - colegasdev_network 


networks:
  colegasdev_network:
    driver: bridge


volumes:
  mysql_data: